<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://kit.fontawesome.com/7b48340f1c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/proto_styles.css">
    <title>Test</title>
</head>

<body>
    <nav>
       
        <div class="anchor">
            <i class="fas fa-arrow-left"></i>
        </div>
        <div class="nav-header">
            <div class="logo"><img src="/assets/img/logo.svg" alt="logo"></div>
        </div>
        <div class="nav-container">
            <div class="bar"></div>
          <section>
            <label for="section">Pricing Engine</label>
            <ul>
                <li class="list-item active"><i class="fa fa-sliders" aria-hidden="true"></i>Publish Pricing</li>
                <li class="list-item"><i class="fa fa-money" aria-hidden="true"></i>Lock Desk</li>
                <li class="list-item"><i class="fa fa-suitcase" aria-hidden="true"></i>Loan Pipeline</li>
            </ul>
          </section>

            </ul>

          <section>
            <label for="section">My Stuff</label>

                <li class="list-item"><i class="fa fa-bell" aria-hidden="true"></i>Notifications</li>
                <li class="list-item"><i class="fa fa-cog" aria-hidden="true"></i>Settings</li>
            </ul>
          </section>
        </div>
    </nav>
    <div class="container-fluid">
        
    </div>
